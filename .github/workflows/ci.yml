name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build
        run: npm install

  test:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: starter/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Test
        run: npm test

  package:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: starter/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Package
        run: tar -czf app-package.tar.gz src package.json package-lock.json server.js
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: starter/app/app-package.tar.gz
